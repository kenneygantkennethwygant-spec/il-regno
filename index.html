    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getDatabase, ref, onValue, push, get, remove, update, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
        const firebaseConfig = {
            apiKey: "AIzaSyByxULPVAzJObzhfDweMDw0Qtx1OumR_Bo",
            authDomain: "il-regno-app.firebaseapp.com",
            databaseURL: "https://il-regno-app-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "il-regno-app",
            storageBucket: "il-regno-app.firebasestorage.app",
            messagingSenderId: "816047392926",
            appId: "1:816047392926:web:9de485468d75d7b4d8538f"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        window.db = db; window.refFunc = ref; window.pushFunc = push;
        window.removeFunc = remove; window.getFunc = get; window.updateFunc = update;
        window.setFunc = set;
        
        const colori = { 'live-tv': '#E50914', sport: '#ff6b6b', film: '#4ecdc4', 'serie-tv': '#a855f7', cartoni: '#00bcd4', anime: '#f97316' };
        const ordine = ['live-tv', 'sport', 'film', 'serie-tv', 'cartoni', 'anime'];

        // Link predefiniti che verranno scritti nel database se mancanti
        const defaultLinks = {
            sport: [{ titolo: 'FCTV33HD', url: 'https://www.fctv33hd.mom/it', icona: '⚽' }],
            film: [{ titolo: 'StreamingCommunity Film', url: 'https://streamingcommunityz.tech/', icona: '🎬' }],
            'serie-tv': [{ titolo: 'StreamingCommunity Serie TV', url: 'https://streamingcommunityz.tech/it/tv-shows', icona: '📺' }],
            cartoni: [{ titolo: 'Loonex Cartoni', url: 'https://loonex.eu/cartoni/', icona: '🐱' }],
            anime: [{ titolo: 'AnimeWorld', url: 'https://www.animeworld.ac/', icona: '🐉' }]
        };

        // Inizializza il database con i link predefiniti se mancanti
        async function initDatabase() {
            const categorieRef = ref(db, 'categorie');
            const snap = await get(categorieRef);
            let data = snap.val() || {};
            let updated = false;
            
            // Assicura che tutte le categorie esistano con la struttura di base
            const baseCats = {
                'live-tv': { icona: '📺', nome: 'LIVE TV', colore: '#E50914' },
                sport: { icona: '🏅', nome: 'Sport', colore: '#ff6b6b' },
                film: { icona: '🎬', nome: 'Film', colore: '#4ecdc4' },
                'serie-tv': { icona: '📺', nome: 'Serie TV', colore: '#a855f7' },
                cartoni: { icona: '🐱', nome: 'Cartoni animati', colore: '#00bcd4' },
                anime: { icona: '🐉', nome: 'Anime', colore: '#f97316' }
            };

            for (const key of ordine) {
                if (!data[key]) {
                    data[key] = { ...baseCats[key], link: defaultLinks[key] || [] };
                    updated = true;
                } else {
                    // Assicura che nome e icona siano corretti
                    if (!data[key].nome) data[key].nome = baseCats[key]?.nome || key;
                    if (!data[key].icona) data[key].icona = baseCats[key]?.icona || '📌';
                    // Se non ci sono link e ci sono default, usa i default
                    if ((!data[key].link || (Array.isArray(data[key].link) && data[key].link.length === 0) || (typeof data[key].link === 'object' && Object.keys(data[key].link).length === 0)) && defaultLinks[key]) {
                        data[key].link = defaultLinks[key];
                        updated = true;
                    }
                }
            }
            
            if (updated) {
                await set(categorieRef, data);
            }
            return data;
        }

        function getProxiedUrl(url) {
            return localStorage.getItem('ilregno_adblock') === 'true' ? window.PROXY_URL + encodeURIComponent(url) : url;
        }

        // Carica i dati dopo l'inizializzazione
        initDatabase().then((categorie) => {
            renderCategories(categorie);
        });

        function renderCategories(categorie) {
            const grid = document.getElementById('categorieGrid');
            grid.innerHTML = '';
            let foundAny = false;
            
            ordine.forEach(key => {
                const cat = categorie[key];
                if (!cat || !cat.link) return;
                const links = Array.isArray(cat.link) 
                    ? cat.link.filter(l => l && l.titolo && l.url)
                    : Object.values(cat.link).filter(l => l && l.titolo && l.url);
                if (links.length === 0) return;
                foundAny = true;
                
                const c = colori[key] || '#f0c040';
                const isLive = key === 'live-tv';
                const card = document.createElement('div');
                card.className = 'categoria-card';
                card.innerHTML = `
                    <div class="card-header" onclick="this.nextElementSibling.classList.toggle('open'); this.querySelector('.card-toggle').classList.toggle('open')">
                        <div class="card-icon-wrapper" style="background:${c}20;color:${c}"><span>${cat.icona||'📌'}</span></div>
                        <h2>${cat.nome||key}${isLive?' <span class="live-badge">LIVE</span>':''}</h2>
                        <span class="card-badge" style="background:${c}20;color:${c}">${links.length}</span>
                        <span class="card-toggle">▶</span>
                    </div>
                    <div class="card-body">
                        ${isLive ? '<input type="text" class="search-input" placeholder="Cerca canale..." oninput="filtraCanali(this)">' : ''}
                        <div class="link-list">
                            ${links.map(l => isLive
                                ? `<div class="link-item live-link" data-titolo="${l.titolo.toLowerCase()}" onclick="event.stopPropagation(); apriPlayer('${l.url.replace(/'/g,"\\'")}','${l.titolo.replace(/'/g,"\\'")}')"><span class="live-dot"></span><span class="link-icon">${l.icona||'📺'}</span><span class="link-titolo">${l.titolo}</span><span class="link-arrow">▶</span></div>`
                                : `<a href="${getProxiedUrl(l.url)}" target="_blank" class="link-item" onclick="event.stopPropagation()"><span class="link-icon">${l.icona||'🔗'}</span><span class="link-titolo">${l.titolo}</span><span class="link-arrow">→</span></a>`
                            ).join('')}
                        </div>
                    </div>`;
                grid.appendChild(card);
            });
            if (!foundAny) {
                grid.innerHTML = '<div class="empty-state"><p>Nessun link. Accedi come admin per aggiungerli.</p></div>';
            }
        }

        // Ascolta cambiamenti in tempo reale
        onValue(ref(db, 'categorie'), (snapshot) => {
            const categorie = snapshot.val();
            if (categorie) {
                renderCategories(categorie);
            }
        });
    </script>

    <script>
        let immagineBase64 = '', modificaId = null, currentHls = null, hideControlsTimer = null;
        const PASSWORD = 'regno2024', STORAGE_KEY = 'ilregno_admin_logged';

        function apriPlayer(url, titolo) {
            document.getElementById('mainApp').style.display = 'none';
            const playerModal = document.getElementById('playerModal');
            playerModal.classList.add('active');
            document.getElementById('canaleNome').textContent = titolo;
            showControls(); resetHideTimer();
            playerModal.addEventListener('mousemove', handleMouseMove);
            playerModal.addEventListener('click', handleInteraction);
            playerModal.addEventListener('keydown', handleInteraction);
            const video = document.getElementById('playerVideo');
            if (currentHls) { currentHls.destroy(); currentHls = null; }
            if (url.includes('.m3u8') && Hls.isSupported()) {
                currentHls = new Hls({ maxBufferLength: 30 });
                currentHls.loadSource(url);
                currentHls.attachMedia(video);
                currentHls.on(Hls.Events.MANIFEST_PARSED, () => video.play().catch(()=>{}));
            } else {
                video.src = url;
                video.play().catch(() => alert('⚠️ Flusso non disponibile.'));
            }
        }
        
        function handleMouseMove() { showControls(); resetHideTimer(); }
        function handleInteraction() { showControls(); resetHideTimer(); }
        function showControls() { document.getElementById('playerTopbar').classList.add('visible'); document.getElementById('playerModal').classList.add('show-cursor'); }
        function hideControls() { document.getElementById('playerTopbar').classList.remove('visible'); document.getElementById('playerModal').classList.remove('show-cursor'); }
        function resetHideTimer() { if (hideControlsTimer) clearTimeout(hideControlsTimer); hideControlsTimer = setTimeout(hideControls, 3000); }
        
        function chiudiPlayer() {
            if (hideControlsTimer) clearTimeout(hideControlsTimer);
            const playerModal = document.getElementById('playerModal');
            playerModal.removeEventListener('mousemove', handleMouseMove);
            playerModal.removeEventListener('click', handleInteraction);
            playerModal.removeEventListener('keydown', handleInteraction);
            if (currentHls) { currentHls.destroy(); currentHls = null; }
            const video = document.getElementById('playerVideo'); video.pause(); video.src = '';
            playerModal.classList.remove('active', 'show-cursor');
            document.getElementById('playerTopbar').classList.remove('visible');
            document.getElementById('mainApp').style.display = 'block';
        }
        
        function toggleFullscreen() {
            const video = document.getElementById('playerVideo');
            if (video.requestFullscreen) video.requestFullscreen().catch(()=>{});
            else if (video.webkitRequestFullscreen) video.webkitRequestFullscreen();
        }

        function toggleAdblock() {
            const current = localStorage.getItem('ilregno_adblock') === 'true';
            localStorage.setItem('ilregno_adblock', current ? 'false' : 'true');
            document.getElementById('btnAdblock').classList.toggle('active', !current);
            alert('Blocco annunci ' + (!current ? 'ATTIVO' : 'DISATTIVO') + '. Ricarica la pagina per applicare.');
            location.reload();
        }
        if (localStorage.getItem('ilregno_adblock') === 'true') document.getElementById('btnAdblock').classList.add('active');

        window.filtraCanali = function(input) {
            const filter = input.value.toLowerCase();
            const cardBody = input.closest('.card-body');
            cardBody.querySelectorAll('.link-item').forEach(item => {
                item.style.display = (item.getAttribute('data-titolo') || '').includes(filter) ? '' : 'none';
            });
        };

        function mostraAdBlock() {
            document.getElementById('modalOverlay')?.remove();
            const overlay = document.createElement('div');
            overlay.className = 'modal-overlay'; overlay.id = 'modalOverlay';
            overlay.innerHTML = `<div class="modal"><div class="modal-header"><h2>🛡️ Naviga senza Pubblicità</h2><button class="modal-close" onclick="chiudiModale()">✕</button></div><p style="color:#9898a8;font-size:0.85rem;margin-bottom:16px;line-height:1.5">Per navigare senza pop-up e annunci fastidiosi:</p><div class="adblock-section"><h3>🤖 <span class="adblock-badge badge-android">ANDROID</span></h3><p>Usa <strong>Brave Browser</strong> con blocco annunci aggressivo.</p><button class="adblock-btn brave" onclick="window.open('https://play.google.com/store/apps/details?id=com.brave.browser','_blank')">📥 Scarica Brave</button></div><div class="adblock-section"><h3>🍎 <span class="adblock-badge badge-ios">IPHONE / IPAD</span></h3><p>Usa <strong>Brave Browser</strong> con blocco aggressivo.</p><button class="adblock-btn brave" onclick="window.open('https://apps.apple.com/app/brave-browser/id1052879175','_blank')">📥 Scarica Brave</button></div><div class="adblock-section"><h3>💻 <span class="adblock-badge badge-chrome">CHROME / PC</span></h3><p>Installa <strong>uBlock Origin Lite</strong>.</p><button class="adblock-btn ublock" onclick="window.open('https://chromewebstore.google.com/detail/ublock-origin-lite/ddkjiahejlhfcafbddmgiahcphecmpfh','_blank')">📥 Installa uBlock</button></div><button class="btn-submit" style="background:#333;color:#fff;margin-top:12px" onclick="chiudiModale()">✕ Chiudi</button></div>`;
            overlay.addEventListener('click', e => { if(e.target===overlay) chiudiModale(); });
            document.body.appendChild(overlay);
        }

        function checkLogin() { (localStorage.getItem(STORAGE_KEY)==='true' ? mostraBottoniAdmin : nascondiBottoniAdmin)(); }
        function login() { const pwd = prompt('🔐 Password admin:'); if(pwd===PASSWORD){localStorage.setItem(STORAGE_KEY,'true');mostraBottoniAdmin();}else if(pwd!==null) alert('❌ Password errata!'); }
        function logout() { if(confirm('🚪 Uscire?')){localStorage.removeItem(STORAGE_KEY);nascondiBottoniAdmin();chiudiModale();} }
        function mostraBottoniAdmin() { 
            document.getElementById('btnAggiungi').classList.add('visible'); document.getElementById('btnModifica').classList.add('visible');
            document.getElementById('btnElimina').classList.add('visible'); document.getElementById('btnLogin').style.display='none';
            document.getElementById('logoutBtn').classList.add('visible');
        }
        function nascondiBottoniAdmin() { 
            document.getElementById('btnAggiungi').classList.remove('visible'); document.getElementById('btnModifica').classList.remove('visible');
            document.getElementById('btnElimina').classList.remove('visible'); document.getElementById('btnLogin').style.display='block';
            document.getElementById('logoutBtn').classList.remove('visible');
        }
        function chiudiModale() { document.getElementById('modalOverlay')?.remove(); modificaId = null; }

        function apriAdmin() {
            if(!localStorage.getItem(STORAGE_KEY)) return alert('🔐 Accedi prima!');
            document.getElementById('modalOverlay')?.remove(); immagineBase64 = ''; modificaId = null;
            const overlay = document.createElement('div'); overlay.className = 'modal-overlay'; overlay.id = 'modalOverlay';
            overlay.innerHTML = `<div class="modal"><div class="modal-header"><h2>➕ Aggiungi Link</h2><button class="modal-close" onclick="chiudiModale()">✕</button></div><div class="form-group"><label>Categoria</label><select id="catSelect"><option value="live-tv">📺 LIVE TV</option><option value="sport">🏅 Sport</option><option value="film">🎬 Film</option><option value="serie-tv">📺 Serie TV</option><option value="cartoni">🐱 Cartoni animati</option><option value="anime">🐉 Anime</option></select></div><div class="form-group"><label>Titolo</label><input type="text" id="titoloInput" placeholder="es. Rai 1"></div><div class="form-group"><label>URL</label><input type="url" id="urlInput" placeholder="https://..."></div><div class="form-group"><label>Icona (emoji)</label><input type="text" id="iconaInput" placeholder="📺" maxlength="2"></div><div class="form-group"><label>Immagine</label><label class="file-upload" for="fileInput">📁 Clicca per caricare</label><input type="file" id="fileInput" accept="image/*" style="display:none" onchange="caricaImmagine(event)"><img id="previewImg" class="preview-img"></div><button class="btn-submit" onclick="salvaLink()">✨ Aggiungi</button></div>`;
            overlay.addEventListener('click', e => { if(e.target===overlay) chiudiModale(); });
            document.body.appendChild(overlay);
        }
        function caricaImmagine(event) {
            const file = event.target.files[0]; if(!file) return;
            if(file.size > 500000) return alert('⚠️ Max 500KB');
            const reader = new FileReader();
            reader.onload = function(e) { immagineBase64 = e.target.result; const p = document.getElementById('previewImg'); if(p){p.src=immagineBase64;p.style.display='block';} };
            reader.readAsDataURL(file);
        }
        async function salvaLink() {
            const cat = document.getElementById('catSelect').value;
            const titolo = document.getElementById('titoloInput').value.trim();
            const url = document.getElementById('urlInput').value.trim();
            const icona = document.getElementById('iconaInput').value.trim() || '🔗';
            if(!titolo||!url) return alert('⚠️ Compila Titolo e URL!');
            try {
                const linkData = { titolo, url, icona };
                if (immagineBase64) linkData.immagine = immagineBase64;
                if (modificaId) {
                    await window.updateFunc(window.refFunc(window.db, `categorie/${cat}/link/${modificaId}`), linkData);
                    alert('✅ Modificato!');
                } else {
                    await window.pushFunc(window.refFunc(window.db, `categorie/${cat}/link`), linkData);
                    alert('✅ Aggiunto!');
                }
                chiudiModale();
            } catch(e) { alert('❌ Errore: ' + e.message); }
        }

        async function apriGestione() {
            if(!localStorage.getItem(STORAGE_KEY)) return alert('🔐 Accedi prima!');
            try {
                const snapshot = await window.getFunc(window.refFunc(window.db, 'categorie'));
                const dati = snapshot.val() || {};
                const colori = { 'live-tv':'#E50914', sport:'#ff6b6b', film:'#4ecdc4', 'serie-tv':'#a855f7', cartoni:'#00bcd4', anime:'#f97316' };
                let html = '<div class="modal"><div class="modal-header"><h2>✏️ Modifica Link</h2><button class="modal-close" onclick="chiudiModale()">✕</button></div>';
                ordine.forEach(key => {
                    const cat = dati[key] || {};
                    const links = Array.isArray(cat.link) ? cat.link.map((l,i) => [i,l]).filter(([id,l])=>l&&l.titolo) : Object.entries(cat.link || {}).filter(([id,l])=>l&&l.titolo);
                    if(!links.length) return;
                    html += `<div class="gestione-cat" style="border-left-color:${colori[key]||'#f0c040'}"><strong style="color:${colori[key]||'#f0c040'}">${cat.icona||''} ${cat.nome||key}</strong>`;
                    links.forEach(([id,l]) => html += `<div class="gestione-item"><span>${l.icona||'🔗'} ${l.titolo}</span><button class="btn-edit" onclick="modificaLink('${key}','${id}')">✏️</button><button class="btn-delete" onclick="eliminaLink('${key}','${id}')">🗑️</button></div>`);
                    html += '</div>';
                });
                html += '</div>';
                document.getElementById('modalOverlay')?.remove();
                const overlay = document.createElement('div'); overlay.className='modal-overlay'; overlay.id='modalOverlay'; overlay.innerHTML=html;
                overlay.addEventListener('click',e=>{if(e.target===overlay)chiudiModale();});
                document.body.appendChild(overlay);
            } catch(e) { alert('❌ Errore: '+e.message); }
        }
        async function apriElimina() {
            if(!localStorage.getItem(STORAGE_KEY)) return alert('🔐 Accedi prima!');
            try {
                const snapshot = await window.getFunc(window.refFunc(window.db,'categorie'));
                const dati = snapshot.val() || {};
                const colori = { 'live-tv':'#E50914', sport:'#ff6b6b', film:'#4ecdc4', 'serie-tv':'#a855f7', cartoni:'#00bcd4', anime:'#f97316' };
                let html = '<div class="modal"><div class="modal-header"><h2>🗑️ Elimina Link</h2><button class="modal-close" onclick="chiudiModale()">✕</button></div>';
                ordine.forEach(key => {
                    const cat = dati[key] || {};
                    const links = Array.isArray(cat.link) ? cat.link.map((l,i) => [i,l]).filter(([id,l])=>l&&l.titolo) : Object.entries(cat.link || {}).filter(([id,l])=>l&&l.titolo);
                    if(!links.length) return;
                    html += `<div class="gestione-cat" style="border-left-color:${colori[key]||'#f0c040'}"><strong style="color:${colori[key]||'#f0c040'}">${cat.icona||''} ${cat.nome||key}</strong>`;
                    links.forEach(([id,l]) => html += `<div class="gestione-item"><span>${l.icona||'🔗'} ${l.titolo}</span><button class="btn-delete" onclick="eliminaLink('${key}','${id}')">🗑️</button></div>`);
                    html += '</div>';
                });
                html += '</div>';
                document.getElementById('modalOverlay')?.remove();
                const overlay = document.createElement('div'); overlay.className='modal-overlay'; overlay.id='modalOverlay'; overlay.innerHTML=html;
                overlay.addEventListener('click',e=>{if(e.target===overlay)chiudiModale();});
                document.body.appendChild(overlay);
            } catch(e) { alert('❌ Errore: '+e.message); }
        }
        async function modificaLink(categoria, id) {
            try {
                const snapshot = await window.getFunc(window.refFunc(window.db, `categorie/${categoria}/link/${id}`));
                const link = snapshot.val(); if(!link) return alert('Non trovato.');
                chiudiModale(); immagineBase64 = link.immagine || ''; modificaId = id;
                const overlay = document.createElement('div'); overlay.className='modal-overlay'; overlay.id='modalOverlay';
                overlay.innerHTML = `<div class="modal"><div class="modal-header"><h2>✏️ Modifica</h2><button class="modal-close" onclick="chiudiModale()">✕</button></div><div class="form-group"><label>Categoria</label><select id="catSelect"><option value="live-tv" ${categoria==='live-tv'?'selected':''}>📺 LIVE TV</option><option value="sport" ${categoria==='sport'?'selected':''}>🏅 Sport</option><option value="film" ${categoria==='film'?'selected':''}>🎬 Film</option><option value="serie-tv" ${categoria==='serie-tv'?'selected':''}>📺 Serie TV</option><option value="cartoni" ${categoria==='cartoni'?'selected':''}>🐱 Cartoni animati</option><option value="anime" ${categoria==='anime'?'selected':''}>🐉 Anime</option></select></div><div class="form-group"><label>Titolo</label><input type="text" id="titoloInput" value="${link.titolo||''}"></div><div class="form-group"><label>URL</label><input type="url" id="urlInput" value="${link.url||''}"></div><div class="form-group"><label>Icona</label><input type="text" id="iconaInput" value="${link.icona||''}" maxlength="2"></div><div class="form-group"><label>Immagine</label><label class="file-upload" for="fileInput">📁 Cambia</label><input type="file" id="fileInput" accept="image/*" style="display:none" onchange="caricaImmagine(event)"><img id="previewImg" class="preview-img" style="${link.immagine?'display:block':''}" src="${link.immagine||''}"></div><button class="btn-submit" onclick="salvaLink()">💾 Salva</button></div>`;
                overlay.addEventListener('click',e=>{if(e.target===overlay)chiudiModale();});
                document.body.appendChild(overlay);
            } catch(e) { alert('❌ Errore: '+e.message); }
        }
        async function eliminaLink(categoria, id) {
            if(!confirm('🗑️ Eliminare?')) return;
            try { await window.removeFunc(window.refFunc(window.db,`categorie/${categoria}/link/${id}`)); alert('✅ Eliminato!'); chiudiModale(); } catch(e) { alert('❌ Errore: '+e.message); }
        }

        checkLogin();
    </script>
</body>
</html>
