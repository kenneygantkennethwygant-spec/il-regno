        .btn-icon.active { color: var(--accent-gold); }
        
        .hero {

        .category-toggle {

            font-size: 24px; cursor: pointer; transition: var(--transition);
        }
        .category-toggle:hover { color: var(--text-primary); transform: scale(1.2); }
        .category-content {
            display: flex; gap: 15px; overflow-x: auto; padding: 10px 0;
            scroll-behavior: smooth; scrollbar-width: thin;
            scrollbar-color: var(--accent-red) var(--bg-secondary);

        .category-content::-webkit-scrollbar { height: 8px; }
        .category-content::-webkit-scrollbar-track { background: var(--bg-secondary); border-radius: 10px; }

        .categories-row {

            background: linear-gradient(135deg, var(--accent-red) 0%, transparent 100%);

        function showToast(msg, type='success') {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = `toast ${type} show`;
            setTimeout(() => t.classList.remove('show'), 3000);
        }
        function applyProxy(url) {
            return (adBlockEnabled && !url.startsWith(PROXY_URL)) ? PROXY_URL + encodeURIComponent(url) : url;
        }
        function isFavorite(item) { return favorites.some(f => f.url === item.url); }
        function toggleFavorite(item) {
            if (isFavorite(item)) {
                favorites = favorites.filter(f => f.url !== item.url);
                showToast('Rimosso dai preferiti');
            } else {
                favorites.push(item);
                showToast('Aggiunto ai preferiti');
            }
            localStorage.setItem('favorites', JSON.stringify(favorites));
            renderCategories();
        }
        
        async function ensureDefaultCategories(existingData) {
            const updates = {};
            let needed = false;
            for (const [key, value] of Object.entries(DEFAULT_DATA)) {
                if (!existingData || !existingData[key]) {
                    updates[key] = value;
                    needed = true;
                }
            }
            if (needed) {
                await db.ref().update(updates);
            }
        }
        
        async function initializeDatabase() {
            try {
                const snapshot = await db.ref().once('value');
                const data = snapshot.val() || {};
                await ensureDefaultCategories(data);
                db.ref().on('value', (snap) => {
                    appData = snap.val() || {};
                    renderCategories();
                });
            } catch (error) {
                console.error('Errore Firebase:', error);
                showToast('Errore caricamento database', 'error');
            }
        }
        
        function renderCategories() {
            const container = document.getElementById('mainContainer');
            container.innerHTML = '';
            if (favorites.length > 0 && (currentCategory === 'all' || currentCategory === 'favorites')) {
                container.appendChild(createCategorySection('favorites', favorites, true));
            }
            if (currentCategory === 'all' || currentCategory === 'live-tv') {
                const liveItems = appData['live-tv'] || [];
                if (liveItems.length) container.appendChild(createCategorySection('live-tv', liveItems));
            }
            if (currentCategory === 'all') {
                container.appendChild(createCategoriesRow());
            } else if (currentCategory !== 'live-tv' && currentCategory !== 'favorites') {
                const items = appData[currentCategory] || [];
                if (items.length) {
                    container.appendChild(createCategorySection(currentCategory, items));
                } else {
                    const empty = document.createElement('div');
                    empty.className = 'empty-message';
                    empty.innerHTML = `<h3>${CATEGORY_NAMES[currentCategory]||currentCategory}</h3><p>Nessun contenuto.</p>`;
                    container.appendChild(empty);
                }
            }
        }
        
        function createCategoriesRow() {
            const section = document.createElement('div');
            section.className = 'category';
            section.innerHTML = `
                <div class="category-header"><h2 class="category-title">📂 Esplora per Categoria</h2></div>
                <div class="categories-row" id="categoriesRow"></div>
            `;
            const row = section.querySelector('.categories-row');
            const show = ['film','serie-tv','sport','cartoni','anime'];
            Object.keys(appData).forEach(k => { if (!['live-tv','film','serie-tv','sport','cartoni','anime','favorites'].includes(k)) show.push(k); });
            show.forEach(catKey => {
                const items = appData[catKey] || [];
                const icon = CATEGORY_ICONS[catKey] || '📁';
                const name = (CATEGORY_NAMES[catKey] || catKey).replace(/^[^\s]+\s/, '');
                const card = document.createElement('div');
                card.className = 'category-card';
                card.tabIndex = 0;
                card.innerHTML = `<span class="category-card-count">${items.length}</span><span class="category-card-icon">${icon}</span><span class="category-card-name">${name}</span>`;
                card.addEventListener('click', () => handleCategoryClick(catKey));
                card.addEventListener('keydown', e => e.key==='Enter' && card.click());
                row.appendChild(card);
            });
            return section;
        }
        
        function handleCategoryClick(catKey) {
            const items = appData[catKey] || [];
            if (items.length === 1 && items[0].type !== 'live') {
                window.open(applyProxy(items[0].url), '_blank');
                return;
            }
            currentCategory = catKey;
            document.querySelectorAll('.navbar-menu li').forEach(li => li.classList.toggle('active', li.dataset.category === catKey));
            renderCategories();
            window.scrollTo({ top:0, behavior:'smooth' });
        }
        
        function createCategorySection(catKey, items, isFav=false) {
            const section = document.createElement('div');
            section.className = `category ${isFav?'favorites-section':''}`;
            const title = CATEGORY_NAMES[catKey] || catKey;
            section.innerHTML = `
                <div class="category-header">
                    <h2 class="category-title">${title}</h2>
                    <button class="category-toggle">➖</button>
                </div>
                <div class="category-content"></div>
            `;
            const content = section.querySelector('.category-content');
            items.forEach((item, idx) => content.appendChild(createCard(item, catKey, idx)));
            section.querySelector('.category-toggle').addEventListener('click', function() {
                const cnt = section.querySelector('.category-content');
                if (cnt.style.display === 'none') { cnt.style.display='flex'; this.textContent='➖'; }
                else { cnt.style.display='none'; this.textContent='➕'; }
            });
            return section;
        }
        
        function createCard(item, catKey, idx) {
            const card = document.createElement('div');
            card.className = 'card';
            card.tabIndex = 0;
            const isLive = item.type === 'live';
            const fav = isFavorite(item);
            card.innerHTML = `
                <div class="card-image">
                    ${isLive ? '<div class="card-badge live">LIVE</div>' : ''}
                    <span>${item.icon||'📺'}</span>
                    <button class="card-favorite ${fav?'active':''}">${fav?'⭐':'☆'}</button>
                </div>
                <div class="card-info">
                    <div class="card-title">${item.name}</div>
                    <div class="card-meta">${isLive?'🔴 Diretta':'🔗 Link esterno'}</div>
                </div>
            `;
            card.addEventListener('click', e => {
                if (e.target.classList.contains('card-favorite')) return;
                if (isLive) openPlayer(item, catKey, idx);
                else window.open(applyProxy(item.url), '_blank');
            });
            card.querySelector('.card-favorite').addEventListener('click', e => {
                e.stopPropagation();
                toggleFavorite(item);
            });
            card.addEventListener('keydown', e => e.key==='Enter' && card.click());
            return card;
        }
        
        function openPlayer(item, catKey, idx) {
            const modal = document.getElementById('playerModal');
            document.getElementById('playerTitle').textContent = item.name;
            currentChannelIndex = idx;
            modal.classList.add('active');
            document.getElementById('miniPlayer').classList.remove('active');
            playStream(document.getElementById('videoPlayer'), item.url);
            setupPlayerControls(catKey);
        }
        
        function playStream(videoEl, url, isMini=false) {
            if (isMini && miniHls) { miniHls.destroy(); miniHls = null; }
            else if (!isMini && hls) { hls.destroy(); hls = null; }
            const proxied = applyProxy(url);
            if (url.includes('.m3u8')) {
                if (Hls.isSupported()) {
                    const instance = new Hls();
                    instance.loadSource(proxied);
                    instance.attachMedia(videoEl);
                    instance.on(Hls.Events.MANIFEST_PARSED, () => videoEl.play().catch(()=>{}));
                    if (isMini) miniHls = instance; else hls = instance;
                } else if (videoEl.canPlayType('application/vnd.apple.mpegurl')) {
                    videoEl.src = proxied;
                    videoEl.play().catch(()=>{});
                }
            } else {
                videoEl.src = proxied;
                videoEl.play().catch(()=>{});
            }
        }
        
        function setupPlayerControls(catKey) {
            const video = document.getElementById('videoPlayer');
            const controls = document.getElementById('playerControls');
            const container = document.getElementById('playerContainer');
            document.getElementById('btnPlayPause').onclick = () => {
                if (video.paused) { video.play(); document.getElementById('btnPlayPause').textContent='⏸️'; }
                else { video.pause(); document.getElementById('btnPlayPause').textContent='▶️'; }
            };
            document.getElementById('btnFullscreen').onclick = () => toggleFullscreen(container);
            const channels = appData[catKey] || [];
            document.getElementById('btnPrevChannel').onclick = () => {
                if (currentChannelIndex > 0) {
                    currentChannelIndex--;
                    const ch = channels[currentChannelIndex];
                    document.getElementById('playerTitle').textContent = ch.name;
                    playStream(video, ch.url);
                }
            };
            document.getElementById('btnNextChannel').onclick = () => {
                if (currentChannelIndex < channels.length-1) {
                    currentChannelIndex++;
                    const ch = channels[currentChannelIndex];
                    document.getElementById('playerTitle').textContent = ch.name;
                    playStream(video, ch.url);
                }
            };
            const hide = () => {
                clearTimeout(controlsTimeout);
                controlsTimeout = setTimeout(() => { if (!video.paused) controls.classList.add('hidden'); }, 3000);
            };
            container.addEventListener('mousemove', () => { controls.classList.remove('hidden'); hide(); });
            container.addEventListener('touchstart', () => { controls.classList.remove('hidden'); hide(); });
            hide();
        }
        
        function toggleFullscreen(el) {
            const d = document;
            const isFs = !!(d.fullscreenElement || d.webkitFullscreenElement || d.mozFullScreenElement || d.msFullscreenElement);
            if (isFs) {
                if (d.exitFullscreen) d.exitFullscreen();
                else if (d.webkitExitFullscreen) d.webkitExitFullscreen();
                else if (d.mozCancelFullScreen) d.mozCancelFullScreen();
                else if (d.msExitFullscreen) d.msExitFullscreen();
            } else {
                if (el.requestFullscreen) el.requestFullscreen().catch(()=>{});
                else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
                else if (el.mozRequestFullScreen) el.mozRequestFullScreen();
                else if (el.msRequestFullscreen) el.msRequestFullscreen();
                else if (el.webkitEnterFullscreen) {
                    const vid = el.querySelector('video');
                    if (vid && vid.webkitEnterFullscreen) vid.webkitEnterFullscreen();
                }
            }
        }
        
        document.getElementById('playerClose').addEventListener('click', () => {
            document.getElementById('playerModal').classList.remove('active');
            const v = document.getElementById('videoPlayer');
            v.pause();
            if (hls) { hls.destroy(); hls = null; }
            if (v.src) showMiniPlayer();
        });
        
        function showMiniPlayer() {
            document.getElementById('miniPlayer').classList.add('active');
            document.getElementById('miniVideo').play().catch(()=>{});
        }
        document.getElementById('miniPlayer').addEventListener('click', e => {
            if (e.target.id==='miniPlayerClose') return;
            document.getElementById('playerModal').classList.add('active');

            const v = document.getElementById('videoPlayer');
            v.src = document.getElementById('miniVideo').src;

            e.stopPropagation();

            if (miniHls) { miniHls.destroy(); miniHls = null; }
        });
        
        /* ========== ADMIN ========== */
        function openAdminPanel() {
            const panel = document.getElementById('adminPanel');
            panel.classList.add('active');
            document.body.style.overflow = 'hidden';
            if (Object.keys(appData).length === 0) {
                db.ref().once('value').then(snap => {
                    appData = snap.val() || {};
                    ensureDefaultCategories(appData).then(() => refreshAdminContent());
                });
            } else {
                refreshAdminContent();
            }
        }
        function closeAdminPanel() {
            document.getElementById('adminPanel').classList.remove('active');
            document.body.style.overflow = '';
        }
        function refreshAdminContent() {
            const content = document.getElementById('adminContent');
            content.innerHTML = '';
            // Ordine desiderato: sport, film, serie-tv, cartoni, anime, poi altre categorie personalizzate, infine live-tv
            const priorityOrder = ['sport', 'film', 'serie-tv', 'cartoni', 'anime'];
            // Set di tutte le chiavi presenti (default + eventuali personalizzate da appData)
            const allKeys = new Set([...Object.keys(DEFAULT_DATA), ...Object.keys(appData)]);
            const orderedKeys = [];
            // Aggiungi prima le categorie predefinite nell'ordine priorityOrder
            priorityOrder.forEach(key => {
                if (allKeys.has(key)) {
                    orderedKeys.push(key);
                    allKeys.delete(key);
                }
            });
            // Aggiungi eventuali altre categorie (personalizzate) in ordine alfabetico
            const remaining = Array.from(allKeys).filter(k => k !== 'live-tv').sort();
            orderedKeys.push(...remaining);
            // Infine, se esiste live-tv, mettilo in fondo
            if (allKeys.has('live-tv') || DEFAULT_DATA['live-tv']) {
                orderedKeys.push('live-tv');
            }
            // Genera le sezioni
            orderedKeys.forEach(catKey => {
                content.appendChild(createAdminSection(catKey));
            });
        }
        
        document.getElementById('btnAdmin').addEventListener('click', () => {
            if (isAdmin) openAdminPanel();
            else document.getElementById('loginModal').classList.add('active');

                document.getElementById('loginModal').classList.remove('active');
                document.getElementById('adminPassword').value = '';

                showToast('Accesso effettuato', 'success');

        });

            document.getElementById('adminPassword').value = '';
        });

            const container = section.querySelector('.admin-items');
            items.forEach((item, idx) => container.appendChild(createAdminItem(item, catKey, idx)));
            section.querySelector('.btn-add-item').addEventListener('click', () => {
                const newItem = { name: 'Nuovo', url: 'https://', icon: '📺', type: 'link' };
                items.push(newItem);
                saveCategory(catKey, items);
                container.appendChild(createAdminItem(newItem, catKey, items.length-1));
            });
            return section;
        }
        
        function createAdminItem(item, catKey, idx) {
            const div = document.createElement('div');
            div.className = 'admin-item';
            div.innerHTML = `
                <input value="${item.icon||''}" placeholder="Icona" style="max-width:60px;" data-field="icon">
                <input value="${item.name||''}" placeholder="Nome" data-field="name">
                <input value="${item.url||''}" placeholder="URL" data-field="url">
                <select data-field="type">
                    <option value="live" ${item.type==='live'?'selected':''}>LIVE TV</option>
                    <option value="link" ${item.type==='link'?'selected':''}>Link esterno</option>
                </select>
                <button class="btn btn-success btn-save">💾</button>
                <button class="btn btn-danger btn-delete">🗑️</button>
            `;
            div.querySelector('.btn-save').addEventListener('click', () => {
                item.icon = div.querySelector('[data-field="icon"]').value;
                item.name = div.querySelector('[data-field="name"]').value;
                item.url = div.querySelector('[data-field="url"]').value;
                item.type = div.querySelector('[data-field="type"]').value;
                const items = appData[catKey] || [];
                items[idx] = item;
                saveCategory(catKey, items);
                showToast('Elemento salvato', 'success');
            });
            div.querySelector('.btn-delete').addEventListener('click', () => {
                if (confirm('Eliminare questo elemento?')) {
                    const items = appData[catKey] || [];
                    items.splice(idx, 1);
                    saveCategory(catKey, items);
                    div.remove();
                    showToast('Elemento eliminato', 'success');
                }
            });
            return div;
        }
        
        function saveCategory(catKey, items) {
            db.ref(catKey).set(items).catch(err => {
                console.error(err);
                showToast('Errore salvataggio', 'error');
            });
        }
        
        document.getElementById('btnAddCategory').addEventListener('click', () => {
            const name = prompt('Nome nuova categoria (es: documentari):');
            if (name) {
                const key = name.toLowerCase().replace(/\s+/g, '-');
                if (!appData[key]) {
                    appData[key] = [];
                    saveCategory(key, []);
                    CATEGORY_NAMES[key] = name;
                    refreshAdminContent();
                    showToast('Categoria aggiunta', 'success');
                } else showToast('Categoria già esistente', 'error');
            }
        });
        
        /* Navbar */
        document.querySelectorAll('.navbar-menu li').forEach(li => {
            li.addEventListener('click', () => {
                const cat = li.dataset.category;
                if (cat === 'all') {
                    currentCategory = 'all';
                    document.querySelectorAll('.navbar-menu li').forEach(l => l.classList.remove('active'));
                    li.classList.add('active');
                    renderCategories();
                    window.scrollTo({top:0, behavior:'smooth'});
                } else handleCategoryClick(cat);
            });
        });
        
        /* AdBlock */
        document.getElementById('btnAdBlock').addEventListener('click', () => {
            adBlockEnabled = !adBlockEnabled;
            localStorage.setItem('adBlock', adBlockEnabled);
            document.getElementById('btnAdBlock').classList.toggle('active', adBlockEnabled);
            showToast(adBlockEnabled ? 'Blocco annunci ON' : 'Blocco annunci OFF', 'success');
        });
        if (adBlockEnabled) document.getElementById('btnAdBlock').classList.add('active');
        
        initializeDatabase();
        
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('data:application/javascript,' + encodeURIComponent(
                `self.addEventListener('install',e=>self.skipWaiting());self.addEventListener('activate',e=>e.waitUntil(clients.claim()));self.addEventListener('fetch',e=>e.respondWith(fetch(e.request).catch(()=>new Response('Offline'))));`
            )).catch(()=>{});
        }
        console.log('👑 IL REGNO - Pronto');
    </script>
</body>
</html>
