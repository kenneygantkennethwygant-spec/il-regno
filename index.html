<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>IL REGNO</title>
    
    <script>
        const manifest = {
            name: "IL REGNO", short_name: "REGNO", start_url: ".", display: "standalone",
            background_color: "#060609", theme_color: "#060609",
            icons: [{ src: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👑</text></svg>", sizes: "512x512", type: "image/svg+xml" }]
        };
        const blob = new Blob([JSON.stringify(manifest)], {type: 'application/json'});
        const manifestURL = URL.createObjectURL(blob);
        const link = document.createElement('link'); link.rel = 'manifest'; link.href = manifestURL;
        document.head.appendChild(link);
    </script>
    
    <meta name="theme-color" content="#060609">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👑</text></svg>">
    
    <style>
        /* (Tutto lo stile precedente + nuovi stili) */
        /* Aggiungo solo gli stili nuovi, il resto è invariato */
        .preferiti-card { background: linear-gradient(135deg, #2a2410, #1a1a10); border: 1px solid rgba(240,192,64,0.3); }
        .star-btn { background: none; border: none; color: #5a5a6e; cursor: pointer; font-size: 1.2rem; padding: 0 4px; transition: 0.2s; }
        .star-btn.active { color: #f0c040; }
        .mini-player { position: fixed; bottom: 0; left: 0; right: 0; background: #000; z-index: 500; display: none; padding: 8px; }
        .mini-player.active { display: flex; align-items: center; gap: 8px; }
        .mini-player video { width: 120px; height: 68px; background: #000; }
        .mini-player .mini-close { background: none; border: none; color: #fff; font-size: 1.2rem; cursor: pointer; }
        .search-input { width: 100%; padding: 8px 12px; background: #16161f; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #fff; margin-bottom: 8px; }
        
        /* PUNTATORE */
        .cursor-dot { position: fixed; width: 20px; height: 20px; background: #f0c040; border-radius: 50%; pointer-events: none; z-index: 9999; box-shadow: 0 0 20px #f0c040; transform: translate(-50%, -50%); display: none; }
        .cursor-dot.active { display: block; }
    </style>
</head>
<body>
    <div class="app-container" id="mainApp">
        <!-- Header, admin-bar, categorie-grid come prima -->
        <!-- Aggiungo la card Preferiti prima delle altre -->
        <div class="categorie-grid" id="categorieGrid">
            <div class="empty-state"><p>Caricamento...</p></div>
        </div>
        <!-- Mini player -->
        <div class="mini-player" id="miniPlayer">
            <video id="miniVideo" muted autoplay playsinline></video>
            <span id="miniTitle" style="flex:1;font-size:0.8rem"></span>
            <button class="mini-close" onclick="chiudiMiniPlayer()">✕</button>
        </div>
    </div>

    <!-- Browser panel con puntatore -->
    <div class="browser-panel" id="browserPanel">
        <div class="browser-toolbar">
            <button onclick="navigateBrowser('back')">←</button>
            <button onclick="navigateBrowser('forward')">→</button>
            <button onclick="navigateBrowser('reload')">↻</button>
            <input type="text" id="browserUrl" placeholder="Cerca o URL..." onkeypress="if(event.key==='Enter') navigateBrowser('url')">
            <button onclick="navigateBrowser('url')">Vai</button>
            <button onclick="togglePuntatore()" id="btnPuntatore" title="Attiva/Disattiva puntatore">🖱️</button>
            <button onclick="chiudiBrowser()">✕</button>
        </div>
        <div class="browser-iframe-container">
            <iframe id="browserIframe" sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-top-navigation allow-presentation"></iframe>
        </div>
        <div class="cursor-dot" id="cursorDot"></div>
    </div>

    <!-- Player fullscreen come prima -->

    <script type="module">
        // Firebase init, colori, ordine
        // ... (codice invariato fino alla generazione delle card)
        
        // Aggiungo la card Preferiti all'inizio
        function creaCardPreferiti() {
            const pref = JSON.parse(localStorage.getItem('ilregno_preferiti') || '[]');
            if (pref.length === 0) return '';
            let html = '<div class="categoria-card preferiti-card"><div class="card-header" onclick="this.nextElementSibling.classList.toggle(\'open\'); this.querySelector(\'.card-toggle\').classList.toggle(\'open\')"><div class="card-icon-wrapper" style="background:#f0c04020;color:#f0c040"><span>⭐</span></div><h2>Preferiti</h2><span class="card-badge" style="background:#f0c04020;color:#f0c040">'+pref.length+'</span><span class="card-toggle">▶</span></div><div class="card-body"><div class="link-list">';
            pref.forEach(p => {
                if (p.type === 'live') {
                    html += `<div class="link-item live-link" onclick="event.stopPropagation(); apriPlayer('${p.url.replace(/'/g,"\\'")}','${p.titolo.replace(/'/g,"\\'")}')"><span class="live-dot"></span><span class="link-icon">${p.icona||'📺'}</span><span class="link-titolo">${p.titolo}</span><span class="link-arrow">▶</span><button class="star-btn active" onclick="event.stopPropagation();togglePreferito('${p.url}','${p.titolo}','${p.icona}','live')">⭐</button></div>`;
                } else {
                    html += `<div class="link-item" onclick="event.stopPropagation(); apriBrowser('${p.url.replace(/'/g,"\\'")}')"><span class="link-icon">${p.icona||'🔗'}</span><span class="link-titolo">${p.titolo}</span><span class="link-arrow">→</span><button class="star-btn active" onclick="event.stopPropagation();togglePreferito('${p.url}','${p.titolo}','${p.icona}','link')">⭐</button></div>`;
                }
            });
            html += '</div></div></div>';
            return html;
        }

        // Aggiungo stella e ricerca nella LIVE TV
        // Modifico la generazione dei link per includere la stella e la barra di ricerca
        // ...
    </script>

    <script>
        // Logica preferiti, mini-player, puntatore
        // ... (nuovo codice)
    </script>
</body>
</html>
